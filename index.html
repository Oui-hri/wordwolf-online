<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ワードウルフ</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/karisagyouba.css">

  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- タイトル -->
  <section id="title-screen" class="screen">

    <div class="hero">
      <img src="images/hosi2.png" class="stars">
      <img src="images/tuki.png" class="moon">
      <img src="images/iwa.png" class="rock">
      <img src="images/ookami.png" class="wolf">
    </div>

    <h1 class="title">
      ワードウルフONLINE
    </h1>

    <button id="create-room-button">
      ルーム作成
    </button>

    <button id="join-room-button">
      ルーム参加
    </button>

  </section>

  <!-- ルーム作成画面 -->
  <section id="create-room-screen" class="screen hidden">

    <div class="room-form-card">

      <div class="join-title">
        <div class="title-side">
          <div class="title-line left"></div>
          <span class="title-star">✦</span>
        </div>

        <span class="title-text">ルーム作成</span>

        <div class="title-side">
          <span class="title-star">✦</span>
          <div class="title-line right"></div>
        </div>
      </div>

      <input id="create-room-name-input" type="text" placeholder="ルーム名を入力">

      <input id="create-player-name-input" type="text" placeholder="あなたの名前を入力">

      <p id="create-room-error" class="form-error"></p>

      <div class="join-buttons">
        <button id="create-room-submit-button">
          作成する
        </button>

        <button id="create-room-back-button">
          戻る
        </button>
      </div>

    </div>

  </section>


  <!-- ルーム参加画面 -->
  <section id="join-room-screen" class="screen hidden">

    <div class="room-form-card">

      <h2 class="join-title">

        <div class="title-side">
          <span class="line"></span>
          <span class="gold-star">✦</span>
        </div>

        <span class="title-text">ルーム参加</span>

        <div class="title-side">
          <span class="gold-star">✦</span>
          <span class="line"></span>
        </div>

      </h2>
      <input id="join-room-name-input" type="text" placeholder="ルーム名を入力">

      <input id="join-player-name-input" type="text" placeholder="あなたの名前を入力">

      <p id="join-room-error" class="form-error"></p>

      <div class="join-buttons">
        <button id="join-room-submit-button">
          参加する
        </button>

        <button id="join-room-back-button">
          戻る
        </button>
      </div>

    </div>

  </section>

  <!-- 待機部屋 -->
  <section id="waiting-screen" class="screen hidden">

    <h2>待機部屋</h2>

    <img src="images/frame.png" class="ornament">

    <div class="room-card">
      <p class="room-label">
        ルームコード
      </p>

      <div id="room-code" class="room-code">
        ABC123
      </div>
    </div>

    <div class="player-card">

      <h3>参加者</h3>

      <ul id="player-list"></ul>

      <!-- カテゴリー選択 -->
      <div id="category-area">
        <p>カテゴリー選択</p>

        <div id="category-scroll">

          <button class="category-chip active" data-value="random">
            🎲<span>ランダム</span>
          </button>

          <button class="category-chip" data-value="food">
            🍔<span>食べ物</span>
          </button>

          <button class="category-chip" data-value="animal">
            🐶<span>動物</span>
          </button>

          <button class="category-chip" data-value="drink">
            ☕<span>飲み物</span>
          </button>

          <button class="category-chip" data-value="sports">
            ⚽<span>スポーツ</span>
          </button>

          <button class="category-chip" data-value="game">
            🎮<span>ゲーム</span>
          </button>

          <button class="category-chip" data-value="anime">
            🎬<span>アニメ</span>
          </button>

          <button class="category-chip" data-value="school">
            🏫<span>学校</span>
          </button>

          <button class="category-chip" data-value="vehicle">
            🚗<span>乗り物</span>
          </button>

          <button class="category-chip" data-value="appliance">
            📺<span>家電</span>
          </button>
          <button class="category-chip" data-value="sns">
            📱<span>SNS</span>
          </button>

          <button class="category-chip" data-value="love">
            💖<span>恋愛</span>
          </button>

          <button class="category-chip" data-value="history">
            📜<span>歴史</span>
          </button>

          <button class="category-chip" data-value="country">
            🌎<span>国</span>
          </button>

          <button class="category-chip" data-value="instrument">
            🎸<span>楽器</span>
          </button>

        </div>

      </div>
      <button id="start-game-button">
        ゲーム開始
      </button>

    </div>

  </section>

  <!-- お題 -->
  <section id="topic-screen" class="screen hidden">

    <h2 class="word-title">
      あなたのお題
    </h2>

    <div class="word-card">
      <div id="player-word" class="word-text"></div>
    </div>

    <p class="countdown-label">
      ゲーム開始まで
    </p>

    <div id="countdown">
      10
    </div>

  </section>

  <!-- 話し合い -->
  <section id="discussion-screen" class="screen hidden">

    <div class="discussion-card">

      <h2>話し合いタイム</h2>

      <div id="discussion-topic" class="discussion-topic"></div>

      <div class="timer-ring">

        <svg width="340" height="340">
          <circle class="ring-bg" cx="170" cy="170" r="150"></circle>
          <circle id="progress-ring" class="ring-progress" cx="170" cy="170" r="150"></circle>
        </svg>

        <div class="timer-inner">
          <div id="discussion-timer">
            02:00
          </div>
        </div>

      </div>

      <button id="hint-button">
        💡 ヒントを見る
      </button>

      <button id="add-time-button" class="hidden">
        ⏳ ＋1分
      </button>

      <button id="go-vote-button" class="hidden">
        🗳 投票へ移動
      </button>

      <div class="memo-container">

        <div class="memo-title">
          メモ
        </div>

        <textarea id="memo-area" placeholder="自由にメモを書こう..."></textarea>

      </div>
      <div id="hint-modal" class="hint-modal hidden">

        <div class="hint-card">

          <h3 class="hint-title">
      話題提供ヒント
    </h3>

          <p id="hint-text" class="hint-text">
      ヒントを読み込み中...
    </p>

          <button id="hint-close-button" class="hint-close-button">
            戻る
          </button>

        </div>

      </div>
    </div>

  </section>

  <!-- 投票 -->
  <section id="vote-screen" class="screen hidden">

    <h2 class="vote-title">
      投票タイム
    </h2>

    <p class="vote-description">
      最も怪しい人物に投票してください
    </p>

    <!-- 投票前：プレイヤー一覧 -->
    <div id="vote-list"></div>

    <!-- 投票前：投票ボタン -->
    <button id="vote-button">
      投票する
    </button>

    <!-- 投票後：待機表示 -->
    <div id="vote-waiting-area" class="vote-waiting-area hidden">

      <div class="vote-waiting-card">

        <h3 class="vote-waiting-title">
          投票しました
        </h3>

        <div class="vote-waiting-divider">
          <span></span>

          <img src="images/nikukyuu.png" alt="" class="vote-waiting-paw-center">

          <span></span>
        </div>

        <p class="vote-waiting-message">
          他の人の投票を待っています…
        </p>

        <p id="vote-status-count" class="vote-status-count">
          投票状況 0 / 0
        </p>

        <div class="vote-paw-loading">
          <img src="images/nikukyuu.png" alt="" class="vote-paw vote-paw-1">
          <img src="images/nikukyuu.png" alt="" class="vote-paw vote-paw-2">
          <img src="images/nikukyuu.png" alt="" class="vote-paw vote-paw-3">
        </div>

        <div class="vote-runner-area">

          <div class="vote-progress-line"></div>

          <div class="vote-wolf-runner">
            <img src="images/tie-wolf-run-1.png" alt="" class="vote-wolf vote-wolf-1">
            <img src="images/tie-wolf-run-2.png" alt="" class="vote-wolf vote-wolf-2">
            <img src="images/tie-wolf-run-3.png" alt="" class="vote-wolf vote-wolf-3">
          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- 同票説明 -->
  <section id="tie-screen" class="screen hidden">

    <!-- 背景レイヤー -->
    <div class="tie-bg-wrap">
      <img src="images/tie-night-sky.png" alt="" class="tie-bg-sky">

      <img src="images/tie-mountain-castle.png" alt="" class="tie-bg-mountain">

      <img src="images/tuki.png" alt="" class="tie-moon">
    </div>

    <!-- 中央カード -->
    <div class="tie-card">

      <h2 class="tie-title">
        同票になりました
      </h2>

      <div class="tie-divider">
        <span></span>

        <img src="images/nikukyuu.png" alt="" class="tie-paw-icon">

        <span></span>
      </div>

      <p class="tie-message">
        もう一度話し合いを行います
      </p>

      <p class="tie-sub-message">
        5秒後に再開します
      </p>

      <div class="tie-loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="tie-runner-area">
        <div class="tie-progress-line"></div>

        <div class="tie-wolf-runner">
          <img src="images/tie-wolf-run-1.png" alt="" class="tie-wolf tie-wolf-1">

          <img src="images/tie-wolf-run-2.png" alt="" class="tie-wolf tie-wolf-2">

          <img src="images/tie-wolf-run-3.png" alt="" class="tie-wolf tie-wolf-3">
        </div>
      </div>

    </div>

  </section>

  <!-- 結果 -->
  <section id="result-screen" class="screen hidden">

    <div id="result-content"></div>

  </section>

  <script src="js/ui.js"></script>
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/room.js"></script>

</body>
</html>
