<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ワードウルフ</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- タイトル -->
  <section id="title-screen" class="screen">

    <h1>ワードウルフオンライン</h1>

    <button id="create-room-button">
      ルーム作成
    </button>

    <button id="join-room-button">
      ルーム参加
    </button>

  </section>

  <!-- 待機部屋 -->
  <section id="waiting-screen" class="screen hidden">

    <h2>待機部屋</h2>

    <p>
            ルームコード
        </p>

    <div id="room-code">
      ABC123
    </div>

    <ul id="player-list">
      <li>田中</li>
      <li>佐藤</li>
      <li>鈴木</li>
    </ul>

    <button id="start-game-button">
      ゲーム開始
    </button>
  </section>

  <!-- お題 -->
  <section id="topic-screen" class="screen hidden">

    <h2>あなたのお題</h2>

    <div class="card">

      犬

    </div>

    <p>ゲーム開始まで</p>

    <div id="countdown">
      10
    </div>

  </section>

  <!-- 話し合い -->
  <section id="discussion-screen" class="screen hidden">

    <h2>話し合いタイム</h2>

    <div id="discussion-timer">
      02:00
    </div>

    <button id="toggle-chat-button">
      チャットを開く
    </button>

    <div id="chat-container" class="hidden">

      <div id="chat-box"></div>

      <input type="text" placeholder="入力">

    </div>

  </section>

  <!-- 投票 -->
  <section id="vote-screen" class="screen hidden">

    <h2>投票</h2>

    <label>
      <input type="radio" name="vote">

      田中
    </label>

    <label>
      <input type="radio" name="vote">

      佐藤
    </label>

    <label>
      <input type="radio" name="vote">

      鈴木
    </label>

    <button>

      投票する

    </button>


  </section>

  <!-- 結果 -->
  <section id="result-screen" class="screen hidden">

    <h2>結果</h2>

  </section>

  <script src="js/ui.js"></script>
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/room.js"></script>
</body>
</html>
