<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ワードウルフ</title>

  <link rel="stylesheet" href="css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- タイトル -->
  <section id="title-screen" class="screen">

    <div class="hero">
      <img src="images/hosi2.png" class="stars">
      <img src="images/tuki.png" class="moon">
      <img src="images/iwa.png" class="rock">
      <img src="images/ookami.png" class="wolf">
    </div>

    <h1 class="title">
      ワードウルフONLINE
    </h1>

    <button id="create-room-button">
      ルーム作成
    </button>

    <button id="join-room-button">
      ルーム参加
    </button>

  </section>

  <!-- ルーム作成画面 -->
  <section id="create-room-screen" class="screen hidden">

    <div class="room-form-card">

      <h2>ルーム作成</h2>

      <input id="create-room-name-input" type="text" placeholder="ルーム名を入力">

      <input id="create-player-name-input" type="text" placeholder="あなたの名前を入力">

      <p id="create-room-error" class="form-error"></p>

      <button id="create-room-submit-button">
        作成する
      </button>

      <button id="create-room-back-button">
        戻る
      </button>

    </div>

  </section>


  <!-- ルーム参加画面 -->
  <section id="join-room-screen" class="screen hidden">

    <div class="room-form-card">

      <h2 class="join-title">
        <span class="title-line left"></span>
        <span class="title-star">✦</span>

        <span class="title-text">ルーム参加</span>

        <span class="title-star">✦</span>
        <span class="title-line right"></span>
      </h2>

      <input id="join-room-name-input" type="text" placeholder="ルーム名を入力">

      <input id="join-player-name-input" type="text" placeholder="あなたの名前を入力">

      <p id="join-room-error" class="form-error"></p>

      <div class="join-buttons">
        <button id="join-room-submit-button">
          参加する
        </button>

        <button id="join-room-back-button">
          戻る
        </button>
      </div>

    </div>

  </section>

  <!-- 待機部屋 -->
  <section id="waiting-screen" class="screen hidden">

    <h2>待機部屋</h2>

    <img src="images/frame.png" class="ornament">

    <div class="room-card">
      <p class="room-label">
        ルームコード
      </p>

      <div id="room-code" class="room-code">
        ABC123
      </div>
    </div>

    <div class="player-card">

      <h3>参加者</h3>

      <ul id="player-list"></ul>

      <!-- カテゴリー選択 -->
      <div id="category-area">
        <p>カテゴリー選択</p>

        <select id="category-select">
          <option value="random">ランダム</option>
          <option value="food">食べ物</option>
          <option value="animal">動物</option>
          <option value="drink">飲み物</option>
          <option value="sports">スポーツ</option>
          <option value="game">ゲーム</option>
          <option value="anime">アニメ</option>
          <option value="school">学校</option>
          <option value="vehicle">乗り物</option>
          <option value="appliance">家電</option>
          <option value="sns">SNS</option>
          <option value="love">恋愛</option>
          <option value="history">歴史</option>
          <option value="country">国</option>
          <option value="instrument">楽器</option>


        </select>
      </div>

      <button id="start-game-button">
        ゲーム開始
      </button>

    </div>

  </section>

  <!-- お題 -->
  <section id="topic-screen" class="screen hidden">

    <h2 class="word-title">
      あなたのお題
    </h2>

    <div class="word-card">
      <div id="player-word" class="word-text"></div>
    </div>

    <p class="countdown-label">
      ゲーム開始まで
    </p>

    <div id="countdown">
      10
    </div>

  </section>

  <!-- 話し合い -->
  <section id="discussion-screen" class="screen hidden">

    <div class="discussion-card">

      <h2>話し合いタイム</h2>

      <div id="discussion-topic" class="discussion-topic"></div>
      <button id="hint-button">
        ヒントを見る
      </button>

      <div class="timer-ring">

        <svg width="340" height="340">
          <circle class="ring-bg" cx="170" cy="170" r="150"></circle>
          <circle id="progress-ring" class="ring-progress" cx="170" cy="170" r="150"></circle>
        </svg>

        <div class="timer-inner">
          <div id="discussion-timer">
            02:00
          </div>
        </div>

      </div>

      <button id="add-time-button" class="hidden">
        ＋1分
      </button>

      <button id="go-vote-button" class="hidden">
        投票へ移動
      </button>

      <div class="memo-container">
        <div class="memo-title">
          メモ
        </div>

        <textarea id="memo-area" placeholder="自由にメモを書こう..."></textarea>
      </div>

    </div>

    <div id="chat-container" class="hidden">
      <div id="chat-box"></div>
      <input type="text" placeholder="入力">
    </div>
    <div id="hint-modal" class="hint-modal hidden">

      <div class="hint-card">

        <h3 class="hint-title">
          話題提供ヒント
        </h3>

        <p id="hint-text" class="hint-text">
          ヒントを読み込み中...
        </p>

        <button id="hint-close-button" class="hint-close-button">
          戻る
        </button>

      </div>

    </div>

  </section>

  <!-- 投票 -->
  <section id="vote-screen" class="screen hidden">

    <h2 class="vote-title">
      投票タイム
    </h2>

    <p>
      最も怪しい人物に投票してください
    </p>

    <div id="vote-list"></div>

    <button id="vote-button">
      投票する
    </button>

  </section>

  <!-- 同票説明 -->
  <section id="tie-screen" class="screen hidden">

    <div class="tie-card">

      <h2 class="tie-title">
      同票になりました
    </h2>

      <div class="tie-divider">
        <span></span>
        <div class="tie-paw">●</div>
        <span></span>
      </div>

      <p class="tie-message">
      もう一度話し合いを行います
    </p>

      <p class="tie-sub-message">
      <span>3秒後</span>に再開します
    </p>

      <div class="tie-loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="tie-runner-area">
        <div class="tie-progress-line"></div>
        <div class="tie-runner">🐺</div>
      </div>

    </div>

  </section>
  <!-- 結果 -->
  <section id="result-screen" class="screen hidden">

    <div id="result-content"></div>

  </section>

  <script src="js/ui.js"></script>
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/room.js"></script>

</body>
</html>
