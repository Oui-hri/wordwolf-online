<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ワードウルフ</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- タイトル -->
  <section id="title-screen" class="screen">

    <h1>ワードウルフオンライン</h1>

    <button>
      ルーム作成
    </button>

    <button>
      ルーム参加
    </button>

  </section>

  <!-- 待機部屋 -->
  <section id="waiting-screen" class="screen hidden">

    <h2>待機部屋</h2>

    <p>
            ルームコード
        </p>

    <div id="room-code">
      ABC123
    </div>

    <ul>
      <li>田中</li>
      <li>佐藤</li>
      <li>鈴木</li>
    </ul>

    <button>
      ゲーム開始
    </button>
  </section>

  <!-- お題 -->
  <section id="topic-screen" class="screen hidden">

    <h2>あなたのお題</h2>

    <div class="card">

      犬

    </div>

  </section>

  <!-- 話し合い -->
  <section id="discussion-screen" class="screen hidden">

    <h2>話し合い</h2>

  </section>

  <!-- 投票 -->
  <section id="vote-screen" class="screen hidden">

    <h2>投票</h2>

    <label>
      <input type="radio" name="vote">

      田中
    </label>

    <label>
      <input type="radio" name="vote">

      佐藤
    </label>

    <label>
      <input type="radio" name="vote">

      鈴木
    </label>

    <button>

      投票する

    </button>


  </section>

  <!-- 結果 -->
  <section id="result-screen" class="screen hidden">

    <h2>結果</h2>

  </section>

  <script src="js/ui.js"></script>
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/firebase.js"></script>
</body>
</html>
